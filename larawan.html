<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mga Larawan ni Aling Baby</title>
</head>
<body>
<main class="gallery-page">
  <header class="gallery-hero">
    <p class="eyebrow">Mga Alaala</p>
    <h1>Mga Larawan ni Aling Baby</h1>
    <p class="gallery-sub">Ilang sandali mula sa pitumpung taon niyang paglalakbay.</p>
    <a href="index.html" class="back-link">&larr; Bumalik sa imbitasyon</a>
  </header>

  <div class="gallery-grid" id="galleryGrid"></div>
</main>

<div class="lightbox" id="lightbox" hidden>
  <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Isara">&times;</button>
  <img id="lightboxImg" src="" alt="Larawan ni Aling Baby" />
</div>

<style>
  :root {
    --ground: #f7efdf;
    --ground-deep: #ede0c8;
    --panel: #fcf8ee;
    --panel-deep: #f2e6ce;
    --gold: #8c6b27;
    --gold-soft: #d2aa5c;
    --coral: #e8604c;
    --coral-deep: #b8462f;
    --ink: #3a2c22;
    --ink-muted: #5e4c3e;
    --hairline: rgba(140, 107, 39, 0.38);
    --font-display: "Didot", "Bodoni MT", "Big Caslon", "Playfair Display",
      Georgia, "Iowan Old Style", serif;
    --font-body: "Athelas", "Iowan Old Style", Georgia, "Times New Roman",
      serif;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: radial-gradient(
        circle at 50% -10%,
        #f6dcc9 0%,
        var(--ground) 45%,
        var(--ground-deep) 100%
      );
    font-family: var(--font-body);
    color: var(--ink);
  }

  .gallery-page {
    max-width: 68rem;
    margin: 0 auto;
    padding: clamp(1.5rem, 5vw, 4rem) 1rem 5rem;
  }

  .gallery-hero {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    margin: 0 0 0.6rem;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral-deep);
  }

  .gallery-hero h1 {
    margin: 0 0 0.6rem;
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(2rem, 6vw, 2.8rem);
    color: var(--gold);
    text-wrap: balance;
  }

  .gallery-sub {
    margin: 0 0 1.2rem;
    color: var(--ink-muted);
    font-style: italic;
  }

  .back-link {
    display: inline-block;
    color: var(--gold);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(140, 107, 39, 0.45);
  }

  .back-link:hover {
    color: var(--coral-deep);
  }

  .gallery-grid {
    columns: 2 240px;
    column-gap: 0.85rem;
  }

  @media (min-width: 640px) {
    .gallery-grid {
      columns: 3 240px;
    }
  }

  @media (min-width: 960px) {
    .gallery-grid {
      columns: 4 240px;
    }
  }

  .gallery-grid img {
    width: 100%;
    display: block;
    margin-bottom: 0.85rem;
    border-radius: 2px;
    border: 1px solid var(--hairline);
    box-shadow: 0 0.4rem 1rem rgba(58, 44, 34, 0.15);
    break-inside: avoid;
    cursor: pointer;
    background: var(--panel);
  }

  .gallery-grid img:hover {
    outline: 2px solid var(--gold);
  }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(23, 19, 14, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    z-index: 50;
  }

  .lightbox[hidden] {
    display: none;
  }

  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 2px;
    box-shadow: 0 1.5rem 3rem rgba(0, 0, 0, 0.5);
  }

  .lightbox-close {
    position: absolute;
    top: 1.2rem;
    right: 1.5rem;
    background: transparent;
    border: none;
    color: var(--panel);
    font-size: 2.2rem;
    line-height: 1;
    cursor: pointer;
  }

  input:focus-visible,
  button:focus-visible,
  a:focus-visible {
    outline: 2px solid var(--gold);
  }
</style>

<script>
  (function () {
    var TOTAL_PHOTOS = 44;
    var grid = document.getElementById("galleryGrid");
    var lightbox = document.getElementById("lightbox");
    var lightboxImg = document.getElementById("lightboxImg");
    var lightboxClose = document.getElementById("lightboxClose");

    for (var i = 1; i <= TOTAL_PHOTOS; i++) {
      var num = i < 10 ? "0" + i : "" + i;
      var img = document.createElement("img");
      img.src = "photos/baby-" + num + ".jpg";
      img.alt = "Larawan ni Aling Baby";
      img.loading = i <= 6 ? "eager" : "lazy";
      img.addEventListener("click", (function (src) {
        return function () {
          lightboxImg.src = src;
          lightbox.hidden = false;
        };
      })(img.src));
      grid.appendChild(img);
    }

    function closeLightbox() {
      lightbox.hidden = true;
      lightboxImg.src = "";
    }

    lightboxClose.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", function (e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeLightbox();
    });
  })();
</script>
</body>
</html>
